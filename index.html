<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css">
    <title>Responsive Images</title>
</head>
    <body>
        <h1 class="visually-hidden">Responsive Images</h1>
        <section class="grid-con center-grid-con pic-el">
            <h2>Picture Element</h2>
            <picture class="col-span-full">
                <source srcset="images/prs-top.jpg" media="(min-width: 768px)">
                <img src="images/prs-back.jpg" alt="prs guitar back">
            </picture>
        </section>

         <section class="grid-con center-grid-con">
            <div class="col-span-full">
                <h2>Image Tag & Srcset Attribute</h2>
                <img
                    sizes="(max-width: 1200px) 100vw, 1200px"
                    srcset="
                    images/les-paul_ywn6xo_c_scale,w_270.jpg 270w,
                    images/les-paul_ywn6xo_c_scale,w_961.jpg 961w,
                    images/les-paul_ywn6xo_c_scale,w_1200.jpg 1200w"
                    src="images/les-paul_ywn6xo_c_scale,w_1200.jpg"
                    alt="les paul guitar">
            </div>
        </section>
        <section class="grid-con center-grid-con bg-img">
            <h2>Background image CSS</h2>
            <div class="col-span-full" id="tele-img">
            </div>
        </section>
        <script src="js/main.js"></script>   
    </body>
</html>
